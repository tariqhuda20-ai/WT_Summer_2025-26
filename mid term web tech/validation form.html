<!DOCTYPE html>
<html>
<head>
  <title>VALIDATION FORM</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
    header { padding: 20px; text-align: center; background: #333; color: #fff; }
    section { padding: 40px; }
    .dark { background: #222; color: #fff; }
    .light { background: #f9f9f9; color: #000; }
    button { padding: 10px 20px; margin-top: 10px; }
    form { width: 400px; padding: 20px; border: 1px solid #ccc; background: #fff; }
    label { display: block; margin-top: 10px; color: black;color: black;} 
    input, textarea { width: 100%; padding: 8px; margin-top: 5px; }
    .error { color: red; font-size: 14px; }
    .success { color: green; font-size: 16px; margin-top: 20px; }
  </style>
</head>
<body class="light">
  <header>
    <h1>My Portfolio</h1>
    <p id="greeting"></p>
    <button onclick="toggleTheme()">Toggle Dark/Light Mode</button>
  </header
  <br>
  <br>
    <h2> <center>Contact Form</center></h2>
    <br>
    <center>
    <form id="contactForm">
      <label>Name:</label>
      <input type="text" id="name">
      <div id="nameError" class="error"></div>

      <label>Email:</label>
      <input type="email" id="email">
      <div id="emailError" class="error"></div>

      <label>Phone Number:</label>
      <input type="text" id="phone">
      <div id="phoneError" class="error"></div>

      <label>Password:</label>
      <input type="password" id="password">
      <div id="passwordError" class="error"></div>

      <label>Age:</label>
      <input type="number" id="age">
      <div id="ageError" class="error"></div>

      <label>Message:</label>
      <textarea id="message"></textarea>
      <div id="messageError" class="error"></div>

      <button type="submit">Register</button>
    </form>
    <div id="successMessage" class="success"></div>
  </section>
</center>

  <script>
    function toggleTheme() {
      document.body.classList.toggle("dark");
      document.body.classList.toggle("light");
    }

    function setGreeting() {
      const hour = new Date().getHours();
      let greeting = "";
      if (hour < 12) greeting = "Good Morning";
      else if (hour < 18) greeting = "Good Afternoon";
      else greeting = "Good Evening";
      document.getElementById("greeting").innerText = greeting;
    }
    setGreeting();

    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();
      let valid = true;

      const name = document.getElementById("name").value.trim();
      if (!/^[A-Za-z ]{3,}$/.test(name)) {
        document.getElementById("nameError").innerText = "Name must be at least 3 characters and only alphabets/spaces.";
        valid = false;
      } else { document.getElementById("nameError").innerText = ""; }

      const email = document.getElementById("email").value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById("emailError").innerText = "Invalid email format.";
        valid = false;
      } else { document.getElementById("emailError").innerText = ""; }

      const phone = document.getElementById("phone").value.trim();
      if (!/^\d{10}$/.test(phone)) {
        document.getElementById("phoneError").innerText = "Phone must be exactly 10 digits.";
        valid = false;
      } else { document.getElementById("phoneError").innerText = ""; }

      const password = document.getElementById("password").value;
      if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}/.test(password)) {
        document.getElementById("passwordError").innerText = "Password must be 8+ chars with uppercase, lowercase, number, and special char.";
        valid = false;
      } else { document.getElementById("passwordError").innerText = ""; }

      const age = document.getElementById("age").value;
      if (age < 18) {
        document.getElementById("ageError").innerText = "Age must be 18 or older.";
        valid = false;
      } else { document.getElementById("ageError").innerText = ""; }

      const message = document.getElementById("message").value.trim();
      if (message.length < 10) {
        document.getElementById("messageError").innerText = "Message must be at least 10 characters.";
        valid = false;
      } else { document.getElementById("messageError").innerText = ""; }

      if (valid) {
        document.getElementById("successMessage").innerHTML =
          `Registration Successful!<br>
           Name: ${name}<br>
           Email: ${email}<br>
           Phone: ${phone}<br>
           Age: ${age}<br>
           Message: ${message}<br>
           Thank you for registering successfully.`;
      }
    });
  </script>
</body>
</html>
